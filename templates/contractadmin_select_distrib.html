{{define "content"}}
{{template "contractadmin_nav" .}}

<h3 style="font-style:italic;">Commandes</h3>

{{if .Distribs}}
<table class="table table-bordered table-striped" style="background:#fff;">
  <thead>
    <tr>
      <th style="width:45%;">Date</th>
      <th style="width:35%;">Lieu</th>
      <th style="width:20%;"></th>
    </tr>
  </thead>
  <tbody>
    {{range .Distribs}}
    <tr>
      <td style="vertical-align:middle;">{{.DateLabel}}</td>
      <td style="vertical-align:middle;">{{.Place}}</td>
      <td style="vertical-align:middle;">
        <a href="/contractAdmin/ordersByDate/{{.DateISO}}/{{$.Group.ID}}?catalog={{$.Catalog.ID}}"
           class="btn btn-default btn-sm">
          <i class="icon icon-basket"></i> Commandes
        </a>
      </td>
    </tr>
    {{end}}
  </tbody>
</table>
{{else}}
<p class="text-muted">Aucune distribution pour ce catalogue.</p>
{{end}}

{{template "contractadmin_close" .}}
{{end}}
