{{define "content"}}
<div class="col-md-9">
  <h2 style="margin:0 0 12px;padding:0 4px;">Envoyer un email</h2>
  <div class="article" style="padding:24px 28px;">
    <form method="POST" action="/messages" id="msgForm">
      <div class="form-group row">
        <label class="col-sm-3 control-label">Nom expéditeur *</label>
        <div class="col-sm-9">
          <input type="text" name="senderName" class="form-control"
            value="{{if .User}}{{.User.FirstName}} {{.User.LastName}}{{end}}" required />
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-3 control-label">Email expéditeur *</label>
        <div class="col-sm-9">
          <input type="text" name="senderEmail" class="form-control"
            value="{{if .User}}{{.User.Email}}{{end}}" required />
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-3 control-label">Destinataires *</label>
        <div class="col-sm-9">
          <select name="recipients" class="form-control">
            <option value="all">Tout le monde</option>
            <option value="members">Membres uniquement</option>
            <option value="managers">Gestionnaires uniquement</option>
          </select>
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-3 control-label">Sujet :</label>
        <div class="col-sm-9">
          <input type="text" name="subject" class="form-control" />
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-3 control-label">Message :</label>
        <div class="col-sm-9">
          <textarea name="body" id="msgBody" class="form-control" rows="12"></textarea>
        </div>
      </div>
      <div class="form-group row">
        <div class="col-sm-9 col-sm-offset-3">
          <button type="submit" class="btn btn-success">
            <i class="icon icon-mail"></i> Envoyer
          </button>
        </div>
      </div>
    </form>
  </div>

  {{range .SentMessages}}
  <div class="article" id="msg-{{.ID}}" style="margin-top:12px;padding:18px 22px;">
    <h4 style="margin-top:0;">{{.Title}} <small style="color:#999;">{{.Date}}</small></h4>
    <p style="margin-bottom:0;">{{.Body}}</p>
  </div>
  {{end}}
</div>

<div class="col-md-3">
  <h2 style="margin:0 0 12px;padding:0 4px;">Archivé</h2>
  <div class="article" style="padding:14px 16px;">
    {{if .SentMessages}}
    <div style="overflow-y:auto;max-height:700px;">
      {{range .SentMessages}}
      <a href="#msg-{{.ID}}" style="display:block;padding:8px 0;border-bottom:1px solid #eee;color:#5a8a00;text-decoration:none;">
        {{.Title}}
        <div style="color:#888;font-size:11px;">{{.Date}}</div>
      </a>
      {{end}}
    </div>
    {{else}}
    <p style="color:#999;font-size:13px;margin:0;">Aucun message.</p>
    {{end}}
  </div>
</div>

<script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
<script>
tinymce.init({
  selector: '#msgBody',
  language: 'fr_FR',
  plugins: 'lists link image emoticons',
  toolbar: 'undo redo | formatselect | bold italic | alignleft aligncenter | numlist bullist | link image emoticons | forecolor',
  menubar: 'file edit insert view format',
  height: 300,
  branding: false,
  promotion: false
});
</script>
{{end}}
