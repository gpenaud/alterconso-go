{{define "content"}}
{{template "amapadmin_nav" .}}
<div class="col-md-9">
  <h2>Donner des droits à un utilisateur</h2>
  <div class="article">
    {{if .Error}}<div class="alert alert-danger">{{.Error}}</div>{{end}}

    <form method="POST" action="/amapadmin/rights/add">
      <div class="form-group">
        <label>Membre *</label>
        <select name="user_id" class="form-control" style="max-width:400px;" required>
          <option value="">-</option>
          {{range .Members}}
          <option value="{{.UserID}}">{{.User.FirstName}} {{.User.LastName}}</option>
          {{end}}
        </select>
      </div>

      <div class="form-group">
        <label>Droits</label><br>
        <label style="font-weight:normal;">
          <input type="checkbox" name="right_group_admin"> Administrateur de groupe
        </label><br>
        <label style="font-weight:normal;">
          <input type="checkbox" name="right_membership"> Gestion des membres
        </label><br>
        <label style="font-weight:normal;">
          <input type="checkbox" name="right_messages"> Messages
        </label><br>
        <label style="font-weight:normal;">
          <input type="checkbox" name="right_database_admin"> Gestion de la base de données
        </label>
      </div>

      <div class="form-group">
        <label>Gestion des catalogues</label><br>
        <label style="font-weight:normal;">
          <input type="checkbox" name="catalog_all" id="catalog_all" onclick="toggleCatalogs(this)"> Tous les catalogues
        </label><br>
        {{range .Catalogs}}
        <label style="font-weight:normal;" class="catalog-item">
          <input type="checkbox" name="catalog_{{.ID}}"> {{.Name}}
        </label><br>
        {{end}}
      </div>

      <hr>
      <button type="submit" class="btn btn-primary">OK</button>
      <a href="/amapadmin/rights" class="btn btn-default" style="margin-left:8px;">Annuler</a>
    </form>
  </div>
</div>

<script>
function toggleCatalogs(cb) {
  document.querySelectorAll('.catalog-item input').forEach(function(el) {
    el.disabled = cb.checked;
    if (cb.checked) el.checked = false;
  });
}
</script>
{{end}}
