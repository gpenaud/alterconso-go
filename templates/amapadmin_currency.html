{{define "content"}}
<div class="col-md-12">
  <div class="article">
    <h2>Monnaie utilisée par votre groupe.</h2>
    <form method="POST" action="/amapadmin/currency">
      <div class="form-group row">
        <label class="col-sm-4 control-label">Symbole de votre monnaie</label>
        <div class="col-sm-8">
          <input type="text" name="currency" class="form-control" value="{{.Group.Currency}}" />
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-4 control-label">Code ISO à 3 lettres</label>
        <div class="col-sm-8">
          <input type="text" name="currencyCode" class="form-control" value="{{.Group.CurrencyCode}}" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="background:#6a9a2a;border-color:#5a8a1a;">OK</button>
    </form>
  </div>
</div>
{{end}}
