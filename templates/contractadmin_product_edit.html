{{define "content"}}
{{template "contractadmin_nav" .}}

<h3 style="font-style:italic;">Modifier un produit</h3>

<form method="POST" class="form-horizontal" style="max-width:720px;">

  <div class="form-group">
    <label class="col-sm-3 control-label">Nom</label>
    <div class="col-sm-7">
      <input type="text" name="name" class="form-control" value="{{.Product.Name}}" required />
    </div>
    {{if .ImageURL}}
    <div class="col-sm-2" style="padding-left:0;">
      <img src="{{.ImageURL}}" style="width:80px;height:80px;object-fit:cover;border-radius:6px;border:1px solid #ddd;" />
    </div>
    {{end}}
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Référence</label>
    <div class="col-sm-9">
      <input type="text" name="ref" class="form-control" value="{{if .Product.Ref}}{{deref .Product.Ref}}{{end}}" />
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Prix *</label>
    <div class="col-sm-9">
      <input type="number" name="price" step="0.01" class="form-control" value="{{printf "%.2f" .Product.Price}}" required />
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Description</label>
    <div class="col-sm-9">
      <textarea name="description" class="form-control" rows="3">{{if .Product.Description}}{{deref .Product.Description}}{{end}}</textarea>
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Stock</label>
    <div class="col-sm-9">
      <input type="number" name="stock" step="0.001" class="form-control"
        value="{{if .Product.Stock}}{{printf "%.3g" (derefFloat .Product.Stock)}}{{end}}" />
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Unité de base</label>
    <div class="col-sm-9">
      {{$u := .Product.UnitType}}
      <label style="font-weight:normal;display:block;"><input type="radio" name="unit_type" value="Piece" {{if or (eq $u "Piece") (eq $u "Unit")}}checked{{end}} /> Pièce</label>
      <label style="font-weight:normal;display:block;"><input type="radio" name="unit_type" value="Kilogram"   {{if eq $u "Kilogram"}}checked{{end}} /> Kilogrammes</label>
      <label style="font-weight:normal;display:block;"><input type="radio" name="unit_type" value="Gram"       {{if eq $u "Gram"}}checked{{end}} /> Grammes</label>
      <label style="font-weight:normal;display:block;"><input type="radio" name="unit_type" value="Litre"      {{if eq $u "Litre"}}checked{{end}} /> Litres</label>
      <label style="font-weight:normal;display:block;"><input type="radio" name="unit_type" value="Centilitre" {{if eq $u "Centilitre"}}checked{{end}} /> Centilitres</label>
      <label style="font-weight:normal;display:block;"><input type="radio" name="unit_type" value="Millilitre" {{if eq $u "Millilitre"}}checked{{end}} /> Millilitres</label>
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Quantité</label>
    <div class="col-sm-9">
      <input type="text" name="qt" class="form-control" placeholder="ex: 1, 1/2, 1/4"
        value="{{if .Product.Qt}}{{qtDisplay .Product.Qt}}{{else}}1{{end}}" />
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">TVA</label>
    <div class="col-sm-9">
      <select name="vat" class="form-control" style="max-width:120px;">
        <option value="0"   {{if eq .Product.VAT 0.0}}selected{{end}}>0%</option>
        <option value="2.1" {{if eq .Product.VAT 2.1}}selected{{end}}>2,1%</option>
        <option value="5.5" {{if eq .Product.VAT 5.5}}selected{{end}}>5,5%</option>
        <option value="10"  {{if eq .Product.VAT 10.0}}selected{{end}}>10%</option>
        <option value="20"  {{if eq .Product.VAT 20.0}}selected{{end}}>20%</option>
      </select>
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Options</label>
    <div class="col-sm-9">
      <label style="font-weight:normal;display:block;">
        <input type="checkbox" name="organic" value="1" {{if .Product.Organic}}checked{{end}} /> Agriculture biologique
      </label>
      <label style="font-weight:normal;display:block;">
        <input type="checkbox" name="variable_price" value="1" {{if .Product.VariablePrice}}checked{{end}} /> Prix variable selon pesée
      </label>
      <label style="font-weight:normal;display:block;">
        <input type="checkbox" name="multi_weight" value="1" {{if .Product.MultiWeight}}checked{{end}} /> Multi-pesée
      </label>
      <label style="font-weight:normal;display:block;">
        <input type="checkbox" name="has_float_qt" value="1" {{if .Product.HasFloatQt}}checked{{end}} /> Autoriser les quantités non entières
      </label>
      <label style="font-weight:normal;display:block;">
        <input type="checkbox" name="active" value="1" {{if .Product.Active}}checked{{end}} /> Disponible
      </label>
    </div>
  </div>

  <div class="form-group">
    <label class="col-sm-3 control-label">Revente</label>
    <div class="col-sm-9">
      <label style="font-weight:normal;display:block;">
        <input type="checkbox" name="is_resale" value="1" {{if .Product.IsResale}}checked{{end}} /> Ce produit est revendu (pas produit par le producteur du catalogue)
      </label>
      <input type="text" name="resale_from" class="form-control" style="margin-top:6px;"
             placeholder="Producteur d'origine (ex : GAEC du Bois)"
             value="{{deref .Product.ResaleFrom}}" />
      <p class="help-block" style="margin-top:4px;">
        Le nom saisi ici s'affiche sur la fiche produit du shop.
      </p>
    </div>
  </div>

  <div class="form-group">
    <div class="col-sm-offset-3 col-sm-9">
      <button type="submit" class="btn btn-primary">OK</button>
      <a href="/contractAdmin/products/{{.Catalog.ID}}" class="btn btn-default" style="margin-left:8px;">Annuler</a>
    </div>
  </div>

</form>

{{template "contractadmin_close" .}}
{{end}}
