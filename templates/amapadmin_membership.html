{{define "content"}}
<div class="col-md-12">
  <div class="article">
    <h2>Adhésions</h2>
    <form method="POST" action="/amapadmin/membership">
      <div class="form-group row">
        <label class="col-sm-4 control-label">Gestion des adhésions</label>
        <div class="col-sm-8">
          <input type="checkbox" name="hasMembership" value="1"
            {{if .Group.HasMembership}}checked{{end}} />
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-4 control-label">Montant de l'adhésion (laisser vide si variable)</label>
        <div class="col-sm-8">
          <input type="text" name="membershipFee" class="form-control"
            value="{{derefInt .Group.MembershipFee}}" />
        </div>
      </div>
      <div class="form-group row">
        <label class="col-sm-4 control-label">Date de renouvellement annuelle des adhésions</label>
        <div class="col-sm-8">
          <input type="text" name="membershipRenewalDate" class="form-control"
            value="{{if .Group.MembershipRenewalDate}}{{.Group.MembershipRenewalDate.Format "02/01"}}{{end}}" />
        </div>
      </div>
      <button type="submit" class="btn btn-primary" style="background:#6a9a2a;border-color:#5a8a1a;">OK</button>
    </form>
  </div>
</div>
{{end}}
