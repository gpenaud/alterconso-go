{{define "content"}}
{{template "amapadmin_nav" .}}
<div class="col-md-9">
  <div class="article" style="padding:32px 36px;">
    <h3 style="font-style:italic;margin:0 0 24px;">Adhésions</h3>
    <form method="POST" action="/amapadmin/membership" class="form-horizontal">

      <div class="form-group" style="margin-bottom:20px;">
        <label class="col-sm-5 control-label" style="text-align:left;padding-top:6px;">Gestion des adhésions</label>
        <div class="col-sm-7" style="padding-top:8px;">
          <input type="checkbox" name="hasMembership" value="1"
            style="width:18px;height:18px;cursor:pointer;"
            {{if .Group.HasMembership}}checked{{end}} />
        </div>
      </div>

      <div class="form-group" style="margin-bottom:20px;">
        <label class="col-sm-5 control-label" style="text-align:left;padding-top:6px;">Montant de l'adhésion <span style="color:#888;font-weight:normal;">(laisser vide si variable)</span></label>
        <div class="col-sm-7">
          <input type="number" min="0" step="1" name="membershipFee" class="form-control"
            value="{{derefInt .Group.MembershipFee}}" />
        </div>
      </div>

      <div class="form-group" style="margin-bottom:28px;">
        <label class="col-sm-5 control-label" style="text-align:left;padding-top:6px;">Date de renouvellement annuelle des adhésions</label>
        <div class="col-sm-7">
          <input type="date" name="membershipRenewalDate" class="form-control"
            value="{{if .Group.MembershipRenewalDate}}{{.Group.MembershipRenewalDate.Format "2006-01-02"}}{{end}}" />
        </div>
      </div>

      <div class="form-group" style="margin-bottom:0;">
        <div class="col-sm-offset-5 col-sm-7">
          <button type="submit" class="btn btn-success">OK</button>
        </div>
      </div>
    </form>
  </div>
</div>
{{end}}
