{{define "content"}}
<div class="col-md-6 col-md-offset-3">
  <div class="article" style="margin-top:40px;">
    <h1>Définir mon mot de passe</h1>

    {{if .Error}}
    <div class="alert alert-danger">{{.Error}}</div>
    {{end}}

    {{if eq .Step 0}}
    <a href="/user/forgottenPassword" class="btn btn-default">Faire une nouvelle demande</a>

    {{else if eq .Step 3}}
    <p>Choisissez votre nouveau mot de passe :</p>
    <form method="POST">
      <input type="hidden" name="token" value="{{.Token}}">
      <div class="form-group">
        <label>Nouveau mot de passe</label>
        <input type="password" name="password" class="form-control" required autofocus />
      </div>
      <div class="form-group">
        <label>Confirmer</label>
        <input type="password" name="password2" class="form-control" required />
      </div>
      <button type="submit" class="btn btn-success">Enregistrer</button>
    </form>

    {{else if eq .Step 4}}
    <div class="alert alert-success">Votre mot de passe a bien été modifié !</div>
    <a href="/user/login" class="btn btn-default">Se connecter</a>
    {{end}}
  </div>
</div>
{{end}}
