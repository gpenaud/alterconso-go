{{define "content"}}
<div class="col-md-8 col-md-offset-2">
  <div class="article">
    <h3 style="font-style:italic;">Sélectionner les rôles nécessaires à la distribution du {{.DateLabel}}</h3>
    <form method="POST">
      {{if .Roles}}
      <div style="margin:16px 0;">
        {{range .Roles}}
        <div style="margin-bottom:10px;">
          <label style="font-weight:normal;">
            <input type="checkbox" name="role_{{.ID}}" value="1" {{if .Selected}}checked{{end}} />
            {{.Name}}{{if .Catalog}} – {{.Catalog}}{{end}}
          </label>
        </div>
        {{end}}
      </div>
      {{else}}
      <p class="text-muted">Aucun rôle de bénévole défini pour ce groupe.</p>
      {{end}}
      <button type="submit" class="btn btn-success">OK</button>
      <a href="/distribution" class="btn btn-default" style="margin-left:8px;">Annuler</a>
    </form>
  </div>
</div>
{{end}}
