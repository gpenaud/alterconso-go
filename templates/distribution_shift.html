{{define "content"}}
<div class="col-md-6">
  <div class="article">
    <h3>Reporter la distribution — {{.Distribution.Catalog.Name}}</h3>
    <form method="POST">
      <div class="form-group">
        <label>Nouvelle date</label>
        <input type="date" name="newDate" class="form-control" value="{{.CurrentDate}}" required />
      </div>
      <button type="submit" class="btn btn-primary">Enregistrer</button>
      <a href="/distribution" class="btn btn-default">Annuler</a>
    </form>
  </div>
</div>
{{end}}
