{{define "amapadmin_nav"}}
<style>
  .amapadmin-section ~ .col-md-9 .article { padding: 24px 28px; }
  .amapadmin-section ~ .col-md-9 .article + .article { margin-top: 16px; }
  .amapadmin-section ~ .col-md-9 .article h3,
  .amapadmin-section ~ .col-md-9 .article h4 { margin-top: 0; }
  .amapadmin-section ~ .col-md-9 > h2 { margin: 0 0 12px; padding: 0 4px; }
  /* La colonne de droite est offsetée seulement si elle n'a pas son propre titre */
  @media (min-width:992px) { .amapadmin-section ~ .col-md-9:not(:has(> h2)) { padding-top: 48px; } }
</style>
<div class="col-md-3 amapadmin-section">
  <h2 style="margin:0 0 12px;padding:0 4px;">Paramètres</h2>
  <div class="article" style="padding:0;">
    <ul class="nav nav-pills nav-stacked" style="margin:0;">
      <li {{if eq .AmapAdminTab "rights"}}class="active"{{end}}>
        <a href="/amapadmin/rights"><i class="icon icon-user"></i> DROITS D'ADMINISTRATION</a>
      </li>
      <li {{if eq .AmapAdminTab "vatRates"}}class="active"{{end}}>
        <a href="/amapadmin/vatRates"><i class="icon icon-balance"></i> TAUX DE TVA</a>
      </li>
      <li {{if eq .AmapAdminTab "volunteers"}}class="active"{{end}}>
        <a href="/amapadmin/volunteers"><i class="icon icon-calendar-check"></i> PERMANENCES</a>
      </li>
      <li {{if eq .AmapAdminTab "membership"}}class="active"{{end}}>
        <a href="/amapadmin/membership"><i class="icon icon-card"></i> ADHÉSIONS</a>
      </li>
      <li {{if eq .AmapAdminTab "currency"}}class="active"{{end}}>
        <a href="/amapadmin/currency"><i class="icon icon-euro"></i> MONNAIE</a>
      </li>
      <li {{if eq .AmapAdminTab "documents"}}class="active"{{end}}>
        <a href="/amapadmin/documents"><i class="icon icon-file"></i> DOCUMENTS</a>
      </li>
    </ul>
  </div>
</div>
{{end}}
