{{define "content"}}
<div class="col-md-6">
  <div class="article">
    <h3>Personnaliser les dates — {{.Distribution.Catalog.Name}}</h3>
    <form method="POST">
      <div class="form-group">
        <label>Ouverture des commandes</label>
        <input type="datetime-local" name="orderStartDate" class="form-control" value="{{.OrderStartDate}}" />
      </div>
      <div class="form-group">
        <label>Clôture des commandes</label>
        <input type="datetime-local" name="orderEndDate" class="form-control" value="{{.OrderEndDate}}" />
      </div>
      <button type="submit" class="btn btn-primary">Enregistrer</button>
      <a href="/distribution" class="btn btn-default">Annuler</a>
    </form>
  </div>
</div>
{{end}}
