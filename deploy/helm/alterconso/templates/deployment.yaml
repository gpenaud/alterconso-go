apiVersion: apps/v1
kind: Deployment
metadata:
  name: alterconso
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: alterconso
  template:
    metadata:
      annotations:
        # Force un rolling update du Deployment quand la ConfigMap ou le
        # Secret changent : k8s détecte que podSpec.annotations a changé
        # et redéploie. Sans ça, kubectl edit configmap → rien ne se passe.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
      labels:
        app: alterconso
    spec:
      containers:
        - name: alterconso
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 8080
          # Secrets injectés en env vars. Le code Go priorité env > yaml,
          # donc DB_PASSWORD (env) prend le pas sur db_password (config.yaml,
          # vide).
          envFrom:
            - secretRef:
                name: alterconso
          # ConfigMap montée comme fichier au chemin attendu par le binaire
          # (CONFIG_FILE par défaut = ./config.yaml, et WORKDIR=/app).
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: alterconso
