apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "alterconso.fullname" . }}
  labels:
    {{- include "alterconso.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "alterconso.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        {{- include "alterconso.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "alterconso.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- if .Values.waitForDatabase.enabled }}
      initContainers:
        # Attend que MySQL réponde sur TCP+protocol avant de démarrer l'app.
        # `mysqladmin ping` retourne OK seulement quand le serveur accepte
        # vraiment des connexions (pas juste socket open). Pas de creds
        # nécessaires — un ping anonyme renvoie "mysqld is alive" même
        # sans auth.
        - name: wait-for-db
          image: {{ .Values.waitForDatabase.image | quote }}
          env:
            - name: DB_HOST
              value: {{ include "alterconso.dbHost" . | quote }}
            - name: DB_PORT
              value: {{ include "alterconso.dbPort" . | quote }}
            - name: TIMEOUT
              value: {{ .Values.waitForDatabase.timeoutSeconds | quote }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              elapsed=0
              until mysqladmin ping -h "$DB_HOST" -P "$DB_PORT" --silent 2>/dev/null; do
                if [ "$elapsed" -ge "$TIMEOUT" ]; then
                  echo "[wait-for-db] timeout: ${DB_HOST}:${DB_PORT} unreachable after ${TIMEOUT}s"
                  exit 1
                fi
                echo "[wait-for-db] waiting for ${DB_HOST}:${DB_PORT}... (${elapsed}s)"
                sleep 2
                elapsed=$((elapsed + 2))
              done
              echo "[wait-for-db] OK: ${DB_HOST}:${DB_PORT} ready"
      {{- end }}
      containers:
        - name: alterconso
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - secretRef:
                name: {{ include "alterconso.secretName" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: {{ include "alterconso.fullname" . }}
