apiVersion: apps/v1
kind: Deployment
metadata:
  name: alterconso
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: alterconso
  template:
    metadata:
      annotations:
        # Force un rolling update du Deployment quand la ConfigMap change.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        # Pour le Secret on ne tracke le checksum que si c'est NOTRE Secret
        # (mode dev). En mode existingSecret, c'est à l'opérateur externe
        # (SOPS/Flux/ESO) de déclencher un rollout — typiquement via
        # `kubectl rollout restart deployment/alterconso` après update du
        # Secret, ou via une annotation propre côté opérateur.
        {{- if not .Values.secrets.existingSecret }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app: alterconso
    spec:
      containers:
        - name: alterconso
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            # Référence le Secret externe si existingSecret est défini,
            # sinon celui que le chart vient de créer (nommé "alterconso").
            - secretRef:
                name: {{ .Values.secrets.existingSecret | default "alterconso" }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
              readOnly: true
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.startupProbe | nindent 12 }}
      volumes:
        - name: config
          configMap:
            name: alterconso
