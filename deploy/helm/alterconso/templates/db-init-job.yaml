{{- /*
Init Job auto-skippé en mode embedded : bitnami/mysql crée déjà la DB +
user au boot via les env vars MYSQL_DATABASE / MYSQL_USER. Lancer notre
Job en plus serait redondant et ferait foirer la 1re install (le serveur
MySQL n'est pas encore up quand le pre-install hook tourne).
*/}}
{{- if and .Values.database.init.enabled (not .Values.database.embedded.enabled) }}
{{- if not .Values.database.init.adminSecret }}
{{- fail "database.init.enabled=true requires database.init.adminSecret to be set" }}
{{- end }}
apiVersion: batch/v1
kind: Job
metadata:
  name: alterconso-db-init
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: {{ .Values.database.init.image | quote }}
          env:
            # En mode external (le seul possible ici), les paramètres viennent
            # de .Values.database.external.
            - name: DB_HOST
              value: {{ .Values.database.external.host | quote }}
            - name: DB_PORT
              value: {{ .Values.database.external.port | quote }}
            - name: DB_NAME
              value: {{ .Values.config.db_name | quote }}
            - name: DB_USER
              value: {{ .Values.config.db_user | quote }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | default "alterconso" }}
                  key: DB_PASSWORD
            - name: MYSQL_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.init.adminSecret }}
                  key: MYSQL_ADMIN_USER
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.init.adminSecret }}
                  key: MYSQL_ADMIN_PASSWORD
          resources:
            {{- toYaml .Values.database.init.resources | nindent 12 }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu
              echo "[db-init] target ${DB_HOST}:${DB_PORT} as ${MYSQL_ADMIN_USER}"
              mysql -h "${DB_HOST}" -P "${DB_PORT}" -u "${MYSQL_ADMIN_USER}" <<SQL
              CREATE DATABASE IF NOT EXISTS \`${DB_NAME}\`
                CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE USER IF NOT EXISTS '${DB_USER}'@'%'
                IDENTIFIED BY '${DB_PASSWORD}';
              ALTER USER '${DB_USER}'@'%'
                IDENTIFIED BY '${DB_PASSWORD}';
              GRANT ALL PRIVILEGES ON \`${DB_NAME}\`.* TO '${DB_USER}'@'%';
              FLUSH PRIVILEGES;
              SQL
              echo "[db-init] OK: ${DB_NAME} / ${DB_USER} provisioned"
{{- end }}
