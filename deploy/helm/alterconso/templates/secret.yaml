{{- /*
Le chart ne crée le Secret QUE si l'utilisateur n'a pas pointé un Secret
externe. Sinon on présume qu'il existe déjà (créé par sops/SealedSecrets/
ExternalSecrets/kubectl). Le Deployment référence dynamiquement l'un ou
l'autre via .Values.secrets.existingSecret | default "alterconso".
*/}}
{{- if not .Values.secrets.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: alterconso
type: Opaque
stringData:
  {{- range $k := (omit .Values.secrets "existingSecret") | keys | sortAlpha }}
  {{ $k }}: {{ index $.Values.secrets $k | quote }}
  {{- end }}
{{- end }}
