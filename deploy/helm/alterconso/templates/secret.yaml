apiVersion: v1
kind: Secret
metadata:
  name: alterconso
# Opaque = "blob de clés/valeurs arbitraires", le type par défaut pour
# du secret applicatif. Ne pas confondre avec kubernetes.io/tls,
# kubernetes.io/dockerconfigjson, etc. qui sont structurés.
type: Opaque
stringData:
  # stringData (vs data) accepte du texte brut — k8s base64-encode pour
  # nous. Plus pratique en template Helm.
  {{- range $k := .Values.secrets | keys | sortAlpha }}
  {{ $k }}: {{ index $.Values.secrets $k | quote }}
  {{- end }}
