apiVersion: v1
kind: ConfigMap
metadata:
  name: alterconso
data:
  # Dump direct de .Values.config en YAML — comme la structure de values
  # mirroite déjà ce qu'attend le code Go, pas de mapping à faire.
  # Le `|` (block scalar) garde le YAML lisible côté kubectl get.
  config.yaml: |
    {{- toYaml .Values.config | nindent 4 }}
