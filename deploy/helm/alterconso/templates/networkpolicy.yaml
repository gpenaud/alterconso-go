{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "alterconso.fullname" . }}
  labels:
    {{- include "alterconso.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "alterconso.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingress.from | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    # DNS — sans ça l'app ne résout pas le hostname de la DB.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if .Values.database.embedded.enabled }}
    # MySQL embedded — même release, sélection par label
    - to:
        - podSelector:
            matchLabels:
              app: {{ include "alterconso.fullname" . }}-mysql
      ports:
        - protocol: TCP
          port: 3306
    {{- end }}
    {{- with .Values.networkPolicy.egress }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
