{{- /*
ServiceAccount dédié à l'app. Pourquoi ne PAS rester sur "default" :
- "default" est partagé avec tous les pods qui ne précisent rien → pas de
  granularité possible si tu veux restreindre l'accès API d'un workload
  particulier.
- Plus tard, si tu rajoutes des outils audit/policy (OPA, Kyverno), avoir
  un SA nommé permet d'écrire des règles ciblées.

automountServiceAccountToken: false — Alterconso ne parle PAS à l'API k8s.
Lui injecter un token serait un risque inutile (un attaquant qui exfiltre
le token aurait de quoi lister/regarder du namespace). On enlève.

Pas de Role / RoleBinding parce que l'app n'a aucun verbe RBAC à exécuter.
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "alterconso.serviceAccountName" . }}
  labels:
    {{- include "alterconso.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
