# Valeurs par défaut. Surcharger via :
#   helm install alterconso ./deploy/helm/alterconso --set image.tag=v0.2.0
#   helm install alterconso ./deploy/helm/alterconso -f values.local.yaml

# Surcharges optionnelles des noms générés par les templates.
# Voir _helpers.tpl pour la logique.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/gpenaud/alterconso
  tag: latest

replicaCount: 1

# ─── ServiceAccount ────────────────────────────────────────────────────────
# L'app ne parle pas à l'API k8s, mais on lui donne un SA dédié pour pouvoir
# écrire des règles audit/policy ciblées si besoin. automountServiceAccount-
# Token désactivé : pas de token utile → pas de surface d'attaque.
serviceAccount:
  create: true
  name: "" # vide = dérivé de fullname
  annotations: {}
  automountServiceAccountToken: false

# ─── Ressources (requests / limits) ──────────────────────────────────────────
# requests = minimum garanti (utilisé par le scheduler pour placer le pod).
# limits   = max autorisé. CPU au-dessus → throttling. RAM au-dessus → OOMKilled.
#
# Alterconso est une app Go modeste : ~50 Mo de heap au repos, montant à
# ~200 Mo en charge. Les valeurs par défaut sont confortables ; ajuste si
# ton k3s est étroit.
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# Tip : pour les apps Go, on peut faire mieux que la "guérison par OOMKill"
# en disant au runtime "voici ta limite, freine le GC en conséquence" :
# Set extraEnv pour ajouter GOMEMLIMIT = ~90% de la limite mémoire.
# Doc Go : https://pkg.go.dev/runtime
extraEnv: []
  # - name: GOMEMLIMIT
  #   value: 230MiB

# ─── Scheduling pod-level ────────────────────────────────────────────────────
# Toutes ces clés sont passées telles quelles au PodSpec, libre à toi de
# remplir avec des structures k8s standards.
nodeSelector: {}
# nodeSelector:
#   disktype: ssd

tolerations: []
# tolerations:
#   - key: dedicated
#     operator: Equal
#     value: alterconso
#     effect: NoSchedule

affinity: {}
# affinity:
#   podAntiAffinity:
#     preferredDuringSchedulingIgnoredDuringExecution:
#       - weight: 100
#         podAffinityTerm:
#           labelSelector:
#             matchLabels: { app: alterconso }
#           topologyKey: kubernetes.io/hostname

priorityClassName: ""

service:
  port: 80

# ─── Ingress ────────────────────────────────────────────────────────────────
# Expose le service publiquement via un Ingress standard k8s.
# Compatible avec n'importe quel controller (Traefik en k3s par défaut,
# nginx, contour, etc.) — il suffit de matcher className.
#
# La liste hosts accepte autant d'entrées que tu veux : domaines, alias,
# multi-AMAP sur la même app, etc. Chaque host a sa propre liste de paths.
ingress:
  enabled: false
  className: traefik

  # Annotations pour le controller. Quelques exemples utiles :
  #   cert-manager.io/cluster-issuer: letsencrypt-prod   (auto-renew TLS)
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   nginx.ingress.kubernetes.io/proxy-body-size: 10m   (uploads gros)
  annotations: {}

  # Liste de hosts. Ajoute autant d'entrées que de domaines à servir.
  hosts:
    - host: alterconso.example.com
      paths:
        - path: /
          pathType: Prefix

  # TLS : chaque entrée associe un Secret de type kubernetes.io/tls
  # (créé par cert-manager, kubectl create secret tls, ou SOPS/SealedSecrets)
  # à une liste d'hôtes couverts par le cert.
  # Vide = HTTP only.
  tls: []
  # Exemple :
  # tls:
  #   - secretName: alterconso-tls
  #     hosts:
  #       - alterconso.example.com
  #       - www.alterconso.example.com

# ─── NetworkPolicy ─────────────────────────────────────────────────────────
# Firewall L3/L4 au niveau pod. Default-deny : tout flux non explicitement
# autorisé est bloqué.
#
# ⚠️ Pour que la policy soit ENFORCÉE, le CNI du cluster doit la supporter :
#    - Calico  ✓
#    - Cilium  ✓
#    - Flannel ✗ (k3s par défaut !) → policy créée mais ignorée
#    Vérifier avec : kubectl get pod -n kube-system | grep -E 'calico|cilium'
networkPolicy:
  enabled: false

  # Sources autorisées vers le port http de l'app.
  ingress:
    from:
      # Ingress controller en kube-system (Traefik dans k3s)
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system

  # Règles egress en plus des règles auto-générées (DNS toujours, MySQL
  # embedded si activé). Liste libre de NetworkPolicyEgressRule.
  egress: []
  # Exemples typiques :
  # - to:
  #     - ipBlock: { cidr: 0.0.0.0/0 }
  #   ports:
  #     - { protocol: TCP, port: 587 }   # SMTP STARTTLS (Brevo)
  #     - { protocol: TCP, port: 443 }   # HTTPS API (Brevo)
  # - to:
  #     - namespaceSelector:
  #         matchLabels:
  #           kubernetes.io/metadata.name: mysql-ns
  #   ports:
  #     - { protocol: TCP, port: 3306 }  # MySQL externe

# ─── PodDisruptionBudget ───────────────────────────────────────────────────
# Protège l'app contre les évictions VOLONTAIRES (kubectl drain, node
# upgrade, autoscaler scale-down). N'a d'effet utile qu'avec replicaCount >= 2 :
# avec 1 seul replica + minAvailable=1, la PDB BLOQUE TOUT drain → tu ne
# peux plus mettre à jour le nœud. À activer quand tu passes en HA.
podDisruptionBudget:
  enabled: false
  # Choisir l'un ou l'autre, jamais les deux (mutuellement exclusifs).
  minAvailable: 1
  # maxUnavailable: 1

# ─── Base de données ────────────────────────────────────────────────────────
# Deux modes mutuellement exclusifs :
#
#   external (default) : pointe sur un MySQL existant (InnoDBCluster, RDS…).
#   embedded           : déploie un StatefulSet MySQL via le sub-chart
#                        bitnami/mysql. Utile en dev / test / mono-app.
#
# db_host et db_port sont calculés automatiquement par le template selon
# le mode actif — pas besoin de les dupliquer.
database:
  # ─── Mode external ────────────────────────────────────────────────────────
  external:
    host: mysql.alterconso.svc.cluster.local
    port: "3306"

  # ─── Mode embedded (StatefulSet inline) ───────────────────────────────────
  # Quand enabled=true :
  #   - un StatefulSet MySQL single-replica est déployé (templates/mysql-
  #     embedded.yaml)
  #   - l'image mysql officielle bootstrappe la DB + user au boot via
  #     MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD env vars
  #   - db_host devient automatiquement <release-name>-mysql
  #   - database.init.enabled est ignoré (l'image fait déjà le boulot)
  #
  # Pour de la prod HA, plutôt utiliser un opérateur MySQL externe
  # (Oracle MySQL Operator avec InnoDBCluster, Percona) en mode external.
  embedded:
    enabled: false
    version: "8.4"
    storageClass: "" # vide = StorageClass par défaut du cluster
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 1Gi

  # ─── Init Job (pertinent en mode external uniquement) ─────────────────────
  init:
    # true → un Job CREATE DATABASE / CREATE USER / GRANT s'exécute avant
    # le déploiement. Utile la 1re fois et lors des rotations de password.
    # Auto-skip en mode embedded.
    enabled: false
    # Image avec le client mysql.
    image: mysql:8.4
    # Secret externe (typiquement géré via SOPS hors-chart) qui contient
    # les credentials admin nécessaires aux CREATE/GRANT.
    # Doit avoir les clés MYSQL_ADMIN_USER et MYSQL_ADMIN_PASSWORD.
    adminSecret: ""
    # Le Job tourne ~5 secondes — quelques requêtes SQL. Resources minimales.
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

# ─── Config applicative (non sensible) ──────────────────────────────────────
# Cette section est dumpée telle quelle dans /app/config.yaml du container.
# La structure ci-dessous DOIT correspondre 1:1 à ce que parse le code Go
# (cf config.yaml.example à la racine du repo). Tout ce qui est sensible
# (mots de passe, clés) reste vide ici et est injecté en env var depuis
# le Secret (le code Go priorité env > yaml).
config:
  port: "8080"
  debug: false

  # db_host et db_port sont injectés par le configmap selon database.embedded
  # (ne pas définir ici).
  db_user: alterconso
  db_name: alterconso

  jwt_expiry_hours: 168

  host: alterconso.example.com

  smtp_host: smtp-relay.brevo.com
  smtp_port: "587"
  smtp_user: ""
  default_email: noreply@example.com

  superadmin:
    email: ""
    first_name: Super
    last_name: Admin

  messages:
    recipient_categories:
      - name: "Membres réguliers"
        pattern: ">= 3 commandes sur 3m"
      - name: "Membres occasionnels"
        pattern: ">= 1 commande sur 6m"
      - name: "Membres inactifs"
        pattern: "< 1 commande sur 6m"

  notifications:
    recipient_category: "Membres réguliers"

# ─── Secrets ────────────────────────────────────────────────────────────────
# Deux modes :
#
#   Mode A (dev / quickstart) : existingSecret vide. Le chart crée un Secret
#   à partir des valeurs ci-dessous. JAMAIS commiter de vraies valeurs —
#   surcharger via --set ou values.local.yaml gitignored.
#
#   Mode B (prod / GitOps / SOPS) : existingSecret = nom d'un Secret déjà
#   présent dans le namespace. Le chart ne crée RIEN, il référence juste.
#   Le Secret peut être créé par : `kubectl apply -f <(sops -d ...)`,
#   helm-secrets plugin, Flux/Argo CD avec décryption SOPS, SealedSecrets,
#   External Secrets Operator, etc. Les noms de clés du Secret doivent
#   matcher : DB_PASSWORD, JWT_SECRET, APP_KEY, SMTP_PASSWORD,
#   BREVO_API_KEY, SUPERADMIN_PASSWORD.
secrets:
  existingSecret: ""

  # Utilisé seulement en mode A (existingSecret vide). Ignoré en mode B.
  DB_PASSWORD: ""
  JWT_SECRET: "" # openssl rand -hex 32
  APP_KEY: "" # openssl rand -hex 32
  SMTP_PASSWORD: ""
  BREVO_API_KEY: ""
  SUPERADMIN_PASSWORD: ""
  # Utilisé seulement quand database.embedded.enabled=true (le sub-chart
  # bitnami/mysql en a besoin pour bootstrapper le serveur MySQL).
  MYSQL_ROOT_PASSWORD: ""

# ─── Probes k8s ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /livez
    port: http
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  failureThreshold: 30
