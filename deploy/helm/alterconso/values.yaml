# Valeurs par défaut. Surcharger via :
#   helm install alterconso ./deploy/helm/alterconso --set image.tag=v0.2.0
#   helm install alterconso ./deploy/helm/alterconso -f values.local.yaml

image:
  repository: ghcr.io/gpenaud/alterconso
  tag: latest

replicaCount: 1

service:
  port: 80

# ─── Config applicative (non sensible) ──────────────────────────────────────
# Cette section est dumpée telle quelle dans /app/config.yaml du container.
# La structure ci-dessous DOIT correspondre 1:1 à ce que parse le code Go
# (cf config.yaml.example à la racine du repo). Tout ce qui est sensible
# (mots de passe, clés) reste vide ici et est injecté en env var depuis
# le Secret (le code Go priorité env > yaml).
config:
  port: "8080"
  debug: false

  db_host: mysql.alterconso.svc.cluster.local
  db_port: "3306"
  db_user: alterconso
  db_name: alterconso

  jwt_expiry_hours: 168

  host: alterconso.example.com

  smtp_host: smtp-relay.brevo.com
  smtp_port: "587"
  smtp_user: ""
  default_email: noreply@example.com

  superadmin:
    email: ""
    first_name: Super
    last_name: Admin

  messages:
    recipient_categories:
      - name: "Membres réguliers"
        pattern: ">= 3 commandes sur 3m"
      - name: "Membres occasionnels"
        pattern: ">= 1 commande sur 6m"
      - name: "Membres inactifs"
        pattern: "< 1 commande sur 6m"

  notifications:
    recipient_category: "Membres réguliers"

# ─── Secrets ────────────────────────────────────────────────────────────────
# Injectés en env vars (le code Go priorité env > yaml). Les noms de clés
# correspondent aux env vars que lit le code (DB_PASSWORD, JWT_SECRET, ...).
# JAMAIS commiter de vraies valeurs — surcharger via --set ou values.local.yaml.
secrets:
  DB_PASSWORD: ""
  JWT_SECRET: "" # openssl rand -hex 32
  APP_KEY: "" # openssl rand -hex 32
  SMTP_PASSWORD: ""
  BREVO_API_KEY: ""
  SUPERADMIN_PASSWORD: ""

# ─── Probes k8s ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /livez
    port: http
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  failureThreshold: 30
