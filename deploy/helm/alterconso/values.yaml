# Valeurs par défaut. Surcharger via :
#   helm install alterconso ./deploy/helm/alterconso --set image.tag=v0.2.0
#   helm install alterconso ./deploy/helm/alterconso -f values.local.yaml

image:
  repository: ghcr.io/gpenaud/alterconso
  tag: latest

replicaCount: 1

service:
  port: 80

# ─── Base de données ────────────────────────────────────────────────────────
# Deux modes mutuellement exclusifs :
#
#   external (default) : pointe sur un MySQL existant (InnoDBCluster, RDS…).
#   embedded           : déploie un StatefulSet MySQL via le sub-chart
#                        bitnami/mysql. Utile en dev / test / mono-app.
#
# db_host et db_port sont calculés automatiquement par le template selon
# le mode actif — pas besoin de les dupliquer.
database:
  # ─── Mode external ────────────────────────────────────────────────────────
  external:
    host: mysql.alterconso.svc.cluster.local
    port: "3306"

  # ─── Mode embedded (StatefulSet inline) ───────────────────────────────────
  # Quand enabled=true :
  #   - un StatefulSet MySQL single-replica est déployé (templates/mysql-
  #     embedded.yaml)
  #   - l'image mysql officielle bootstrappe la DB + user au boot via
  #     MYSQL_DATABASE / MYSQL_USER / MYSQL_PASSWORD env vars
  #   - db_host devient automatiquement <release-name>-mysql
  #   - database.init.enabled est ignoré (l'image fait déjà le boulot)
  #
  # Pour de la prod HA, plutôt utiliser un opérateur MySQL externe
  # (Oracle MySQL Operator avec InnoDBCluster, Percona) en mode external.
  embedded:
    enabled: false
    version: "8.4"
    storageClass: "" # vide = StorageClass par défaut du cluster
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1
        memory: 1Gi

  # ─── Init Job (pertinent en mode external uniquement) ─────────────────────
  init:
    # true → un Job CREATE DATABASE / CREATE USER / GRANT s'exécute avant
    # le déploiement. Utile la 1re fois et lors des rotations de password.
    # Auto-skip en mode embedded.
    enabled: false
    # Image avec le client mysql.
    image: mysql:8.4
    # Secret externe (typiquement géré via SOPS hors-chart) qui contient
    # les credentials admin nécessaires aux CREATE/GRANT.
    # Doit avoir les clés MYSQL_ADMIN_USER et MYSQL_ADMIN_PASSWORD.
    adminSecret: ""

# ─── Config applicative (non sensible) ──────────────────────────────────────
# Cette section est dumpée telle quelle dans /app/config.yaml du container.
# La structure ci-dessous DOIT correspondre 1:1 à ce que parse le code Go
# (cf config.yaml.example à la racine du repo). Tout ce qui est sensible
# (mots de passe, clés) reste vide ici et est injecté en env var depuis
# le Secret (le code Go priorité env > yaml).
config:
  port: "8080"
  debug: false

  # db_host et db_port sont injectés par le configmap selon database.embedded
  # (ne pas définir ici).
  db_user: alterconso
  db_name: alterconso

  jwt_expiry_hours: 168

  host: alterconso.example.com

  smtp_host: smtp-relay.brevo.com
  smtp_port: "587"
  smtp_user: ""
  default_email: noreply@example.com

  superadmin:
    email: ""
    first_name: Super
    last_name: Admin

  messages:
    recipient_categories:
      - name: "Membres réguliers"
        pattern: ">= 3 commandes sur 3m"
      - name: "Membres occasionnels"
        pattern: ">= 1 commande sur 6m"
      - name: "Membres inactifs"
        pattern: "< 1 commande sur 6m"

  notifications:
    recipient_category: "Membres réguliers"

# ─── Secrets ────────────────────────────────────────────────────────────────
# Deux modes :
#
#   Mode A (dev / quickstart) : existingSecret vide. Le chart crée un Secret
#   à partir des valeurs ci-dessous. JAMAIS commiter de vraies valeurs —
#   surcharger via --set ou values.local.yaml gitignored.
#
#   Mode B (prod / GitOps / SOPS) : existingSecret = nom d'un Secret déjà
#   présent dans le namespace. Le chart ne crée RIEN, il référence juste.
#   Le Secret peut être créé par : `kubectl apply -f <(sops -d ...)`,
#   helm-secrets plugin, Flux/Argo CD avec décryption SOPS, SealedSecrets,
#   External Secrets Operator, etc. Les noms de clés du Secret doivent
#   matcher : DB_PASSWORD, JWT_SECRET, APP_KEY, SMTP_PASSWORD,
#   BREVO_API_KEY, SUPERADMIN_PASSWORD.
secrets:
  existingSecret: ""

  # Utilisé seulement en mode A (existingSecret vide). Ignoré en mode B.
  DB_PASSWORD: ""
  JWT_SECRET: "" # openssl rand -hex 32
  APP_KEY: "" # openssl rand -hex 32
  SMTP_PASSWORD: ""
  BREVO_API_KEY: ""
  SUPERADMIN_PASSWORD: ""
  # Utilisé seulement quand database.embedded.enabled=true (le sub-chart
  # bitnami/mysql en a besoin pour bootstrapper le serveur MySQL).
  MYSQL_ROOT_PASSWORD: ""

# ─── Probes k8s ────────────────────────────────────────────────────────────
livenessProbe:
  httpGet:
    path: /livez
    port: http
  periodSeconds: 30
  timeoutSeconds: 3
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  failureThreshold: 30
